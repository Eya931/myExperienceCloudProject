<template>
    <div class="login-page">

        <!-- Left panel — branding -->
        <div class="brand-panel" data-id="brandPanel">
            <div class="brand-overlay"></div>
            <div class="brand-content">
                <h2 class="brand-logo">JobBoard</h2>
                <h1 class="brand-headline">Find work<br/>that matters.</h1>
                <p class="brand-sub">Thousands of jobs from companies who value your talent.</p>
                <div class="brand-stats">
                    <div class="stat">
                        <span class="stat-number">2,400+</span>
                        <span class="stat-label">Open roles</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">500+</span>
                        <span class="stat-label">Companies</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">50+</span>
                        <span class="stat-label">Countries</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right panel — login form -->
        <div class="form-panel">
            <div class="form-wrapper">

                <div class="form-header">
                    <span class="form-badge">Welcome back</span>
                    <h1 class="form-title">Sign in to your account</h1>
                    <p class="form-subtitle">Enter your credentials to access the job board</p>
                </div>

                <!-- Error -->
                <template if:true={errorMessage}>
                    <div class="error-box">
                        <span class="error-icon">&#9888;</span>
                        <span>{errorMessage}</span>
                    </div>
                </template>

                <!-- Form -->
                <div class="form-fields">
                    <div class="field">
                        <label class="field-label" for="email">Email address</label>
                        <div class="input-wrap">
                            <span class="input-icon">&#9993;</span>
                            <input
                                id="email"
                                type="text"
                                class="input"
                                placeholder="you@company.com"
                                value={username}
                                onchange={handleUsernameChange}
                                autocomplete="username"
                            />
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-row">
                            <label class="field-label" for="password">Password</label>
                            <a class="forgot-link" href={forgotPasswordUrl}>Forgot password?</a>
                        </div>
                        <div class="input-wrap">
                            <span class="input-icon">&#128274;</span>
                            <input
                                id="password"
                                type="password"
                                class="input"
                                placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                                value={password}
                                onchange={handlePasswordChange}
                                onkeyup={handleKeyUp}
                                autocomplete="current-password"
                            />
                            <button type="button" class="toggle-btn" onclick={togglePassword} aria-label="Toggle password">
                                <template if:true={showPassword}>&#128065;</template>
                                <template if:false={showPassword}>&#128064;</template>
                            </button>
                        </div>
                    </div>

                    <button class={loginBtnClass} onclick={handleLogin} disabled={isLoading}>
                        <template if:true={isLoading}>
                            <span class="spinner"></span>
                            Signing in...
                        </template>
                        <template if:false={isLoading}>
                            Sign in &#8594;
                        </template>
                    </button>
                </div>

                <!-- Divider -->
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">or</span>
                    <span class="divider-line"></span>
                </div>

                <!-- Footer -->
                <p class="form-footer">&copy; 2026 JobBoard &middot; Powered by Salesforce</p>
            </div>
        </div>

    </div>
</template>

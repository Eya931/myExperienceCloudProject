<template>
    <div class="portal-wrap">
        <aside class={sidebarClass}>
            <div class="sb-brand">
                <div class="sb-mark">TB</div>
                <div class="sb-brand-text">
                    <span class="sb-name">TalentBridge</span>
                    <span class="sb-sub">Candidate Portal</span>
                </div>
            </div>

            <nav class="sb-nav" aria-label="Portal menu">
                <template for:each={navItems} for:item="item">
                    <button
                        key={item.id}
                        class={item.cssClass}
                        data-id={item.id}
                        onclick={handleNav}
                        type="button"
                        title={item.label}
                    >
                        <span class="sb-emoji" aria-hidden="true">{item.icon}</span>
                        <span class="sb-label">{item.label}</span>
                        <template if:true={item.badge}>
                            <span class="sb-badge">{item.badge}</span>
                        </template>
                    </button>
                </template>
            </nav>

            <div class="sb-foot">
                <span>{userName}</span>
                <span>Candidate Space</span>
            </div>
        </aside>

        <div class="portal-main">
            <div class="topbar">
                <button class="tb-ham" onclick={toggleSidebar} type="button" title="Toggle sidebar">
                    <span></span><span></span><span></span>
                </button>
                <div class="tb-heading">
                    <span class="tb-title">{currentTitle}</span>
                    <span class="tb-sub">{sectionSubtitle}</span>
                </div>
                <div class="tb-sw">
                    <lightning-icon icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                    <input type="text" class="tb-search" placeholder="Search something here..."/>
                </div>
                <div class="tb-right">
                    <div class="tb-pill" if:true={unreadMessagesCount}>
                        {unreadMessagesCount} unread
                    </div>
                    <button class="tb-icon-btn" type="button" onclick={goToMessages} title="Notifications">
                        <lightning-icon icon-name="utility:reminder" size="x-small" alternative-text="Notifications"></lightning-icon>
                        <template if:true={hasUnreadMessages}>
                            <span class="tb-icon-badge">{unreadMessagesCount}</span>
                        </template>
                    </button>

                    <div class="tb-user-menu">
                        <button class="tb-avatar-btn" type="button" onclick={toggleUserMenu} title="User menu">
                            <div class="tb-avatar">{userInitials}</div>
                            <div class="tb-user">
                                <span class="tb-uname">{userName}</span>
                                <span class="tb-urole">Candidate</span>
                            </div>
                        </button>

                        <template if:true={isUserMenuOpen}>
                            <div class="tb-menu">
                                <button class="tb-menu-item" type="button" data-action="profile" onclick={handleUserMenuAction}>My Profile</button>
                                <button class="tb-menu-item" type="button" data-action="logout" onclick={handleUserMenuAction}>Logout</button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
            <div class="breadcrumb">Portal / <span>{currentTitle}</span></div>

            <div class="content-area">
                <div class="content-card">
                    <template if:true={isDashboard}>
                        <c-portal-dashboard user-name={userName} onnavigate={handleChildNavigate}></c-portal-dashboard>
                    </template>
                    <template if:true={isApplications}>
                        <section class="app-shell">
                            <c-portal-applications></c-portal-applications>

                            <div class="notif-box" if:true={hasInterviewNotifications}>
                                <h3 class="notif-title">Interview Notifications</h3>
                                <template for:each={interviewNotifications} for:item="notif">
                                    <div key={notif.id} class="notif-item">
                                        <div class="notif-icon">📅</div>
                                        <div class="notif-text">
                                            <span class="notif-main">{notif.message}</span>
                                            <span class="notif-sub">{notif.whenText}</span>
                                        </div>
                                        <span class={notif.statusClass}>{notif.status}</span>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </template>
                    <template if:true={isMessages}>
                        <c-portal-messages></c-portal-messages>
                    </template>
                    <template if:true={isStatistics}>
                        <c-portal-statistics></c-portal-statistics>
                    </template>
                    <template if:true={isNews}>
                        <c-portal-news></c-portal-news>
                    </template>
                    <template if:true={isProfile}>
                        <c-portal-profile
                            user-name={userName}
                            user-email={userEmail}
                            user-phone={userPhone}
                            first-name={firstName}
                            last-name={lastName}
                            matching-score={matchingScore}
                            profile-completion={profileCompletion}
                            cv-file-name={cvFileName}
                            onprofilesaved={handleProfileSaved}
                        ></c-portal-profile>
                    </template>
                    <template if:true={isAssistant}>
                        <c-portal-assistant></c-portal-assistant>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>

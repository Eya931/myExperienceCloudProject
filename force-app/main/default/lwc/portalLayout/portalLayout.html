<template>
    <div class="portal-wrap">
        <aside class={sidebarClass}>
            <div class="sb-brand">
                <div class="sb-mark">TB</div>
                <div class="sb-brand-text">
                    <span class="sb-name">TalentBridge</span>
                    <span class="sb-sub">Candidate Portal</span>
                </div>
            </div>

            <nav class="sb-nav" aria-label="Portal menu">
                <template for:each={navItems} for:item="item">
                    <button
                        key={item.id}
                        class={item.cssClass}
                        data-id={item.id}
                        onclick={handleNav}
                        type="button"
                        title={item.label}
                    >
                        <lightning-icon icon-name={item.icon} size="small" alternative-text={item.label} class="sb-icon"></lightning-icon>
                        <span class="sb-label">{item.label}</span>
                        <template if:true={item.badge}>
                            <span class="sb-badge">{item.badge}</span>
                        </template>
                    </button>
                </template>
            </nav>

            <div class="sb-foot">
                <span>{userName}</span>
                <span>Candidate Space</span>
            </div>
        </aside>

        <div class="portal-main">
            <div class="topbar">
                <button class="tb-ham" onclick={toggleSidebar} type="button" title="Toggle sidebar">
                    <span></span><span></span><span></span>
                </button>
                <div class="tb-heading">
                    <span class="tb-title">{currentTitle}</span>
                    <span class="tb-sub">{sectionSubtitle}</span>
                </div>
                <div class="tb-sw">
                    <lightning-icon icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                    <input type="text" class="tb-search" placeholder="Search something here..."/>
                </div>
                <div class="tb-right">
                    <div class="tb-ib">
                        <lightning-icon icon-name="utility:chat" size="x-small" alternative-text="Messages"></lightning-icon>
                        <div class="tb-ibadge">2</div>
                    </div>
                    <div class="tb-ib">
                        <lightning-icon icon-name="utility:notification" size="x-small" alternative-text="Notifs"></lightning-icon>
                        <div class="tb-ibadge">3</div>
                    </div>
                    <div class="tb-avatar">{userInitials}</div>
                    <div class="tb-user">
                        <span class="tb-uname">{userName}</span>
                        <span class="tb-urole">Candidate</span>
                    </div>
                    <button class="tb-logout" onclick={handleLogout} title="Se déconnecter">
                        <lightning-icon icon-name="utility:logout" size="xx-small" alternative-text="Logout"></lightning-icon>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
            <div class="breadcrumb">Portal / <span>{currentTitle}</span></div>

            <div class="content-area">
                <div class="content-card">
                    <template if:true={isDashboard}>
                        <c-portal-dashboard user-name={userName}></c-portal-dashboard>
                    </template>
                    <template if:true={isApplications}>
                        <section class="app-shell">
                            <div class="app-head">
                                <div>
                                    <h2 class="app-title">Mon suivi de candidature</h2>
                                    <p class="app-subtitle">Suivez chaque etape: coding game, entretiens et decision finale.</p>
                                </div>
                                <div class="app-ref">Opportunity: OP-2026-1184</div>
                            </div>

                            <div class="stage-track">
                                <template for:each={applicationTimeline} for:item="stage">
                                    <article key={stage.id} class={stage.className}>
                                        <div class="stage-top">
                                            <div class="icon-circle">
                                                <lightning-icon icon-name={stage.icon} size="x-small" alternative-text={stage.label}></lightning-icon>
                                            </div>
                                        </div>
                                        <h3 class="stage-title">{stage.label}</h3>
                                        <p class="stage-note">{stage.note}</p>
                                    </article>
                                </template>
                            </div>

                            <div class="decision-box">
                                <span class="decision-label">Decision finale</span>
                                <div class="decision-row">
                                    <span class={acceptedClass}>Candidature acceptee</span>
                                    <span class={refusedClass}>Candidature refusee</span>
                                </div>
                            </div>

                            <div class="notif-box">
                                <h3 class="notif-title">Notifications d'entretiens planifies</h3>
                                <template for:each={interviewNotifications} for:item="notif">
                                    <div key={notif.id} class="notif-item">
                                        <div class="notif-icon">
                                            <lightning-icon icon-name={notif.icon} size="x-small" alternative-text={notif.type}></lightning-icon>
                                        </div>
                                        <div class="notif-text">
                                            <span class="notif-main">{notif.message}</span>
                                            <span class="notif-sub">{notif.whenText}</span>
                                        </div>
                                        <span class={notif.statusClass}>{notif.status}</span>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </template>
                    <template if:true={isJobs}>
                        <c-jobs-list></c-jobs-list>
                    </template>
                    <template if:true={isMessages}>
                        <c-portal-messages></c-portal-messages>
                    </template>
                    <template if:true={isStatistics}>
                        <c-portal-statistics></c-portal-statistics>
                    </template>
                    <template if:true={isNews}>
                        <c-portal-news></c-portal-news>
                    </template>
                    <template if:true={isProfile}>
                        <c-portal-profile user-name={userName} user-email={userEmail}></c-portal-profile>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>

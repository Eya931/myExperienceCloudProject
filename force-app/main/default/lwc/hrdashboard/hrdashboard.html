<template>
    <div class="dashboard">

        <!-- Top Bar -->
        <div class="dashboard__topbar">
            <div class="topbar__left">
                <h1 class="topbar__title">HR Dashboard</h1>
                <span class="topbar__date">{todayFormatted}</span>
            </div>
            <div class="topbar__right">
                <div class="topbar__search">
                    <span class="topbar__search-icon">🔍</span>
                    <input
                        type="text"
                        class="topbar__search-input"
                        placeholder="Search candidates, jobs..."
                        onkeyup={handleSearch}
                    />
                </div>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="dashboard__stats">
            <template if:true={isLoading}>
                <div class="stat-card stat-card--skeleton" aria-busy="true"></div>
                <div class="stat-card stat-card--skeleton" aria-busy="true"></div>
                <div class="stat-card stat-card--skeleton" aria-busy="true"></div>
                <div class="stat-card stat-card--skeleton" aria-busy="true"></div>
            </template>
            <template if:false={isLoading}>
                <template for:each={statCards} for:item="card">
                    <div key={card.id} class="stat-card" style={card.style}>
                        <div class="stat-card__body">
                            <div>
                                <p class="stat-card__label">{card.label}</p>
                                <p class="stat-card__value">{card.value}</p>
                                <p class="stat-card__sub">{card.sub}</p>
                            </div>
                            <div class="stat-card__icon">{card.icon}</div>
                        </div>
                        <div class="stat-card__bar" style={card.barStyle}></div>
                    </div>
                </template>
            </template>
        </div>

        <!-- Main Content Grid -->
        <div class="dashboard__grid">

            <!-- Left: Pipeline + Recent Applications -->
            <div class="dashboard__col dashboard__col--wide">

                <!-- Pipeline -->
                <div class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">Recruitment Pipeline</h2>
                        <button class="panel__link" onclick={navigateToPipeline}>View all →</button>
                    </div>
                    <div class="pipeline">
                        <template for:each={pipelineStages} for:item="stage">
                            <div key={stage.name} class="pipeline__stage">
                                <div class="pipeline__stage-header">
                                    <span class="pipeline__stage-dot" style={stage.dotStyle}></span>
                                    <span class="pipeline__stage-name">{stage.name}</span>
                                    <span class="pipeline__stage-count" style={stage.countStyle}>{stage.count}</span>
                                </div>
                                <div class="pipeline__bar-track">
                                    <div class="pipeline__bar-fill" style={stage.fillStyle}></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Converted Candidates Table -->
                <div class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">Converted Candidates</h2>
                        <button class="panel__link" onclick={navigateToCandidates}>See all →</button>
                    </div>
                    <template if:true={isLoading}>
                        <div class="table-skeleton"></div>
                    </template>
                    <template if:false={isLoading}>
                        <div class="table-wrap">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Candidate</th>
                                        <th>Email</th>
                                        <th>Converted On</th>
                                        <th>AI Score</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={convertedCandidates} for:item="candidate">
                                        <tr key={candidate.id} class="table__row">
                                            <td>
                                                <div class="candidate-cell">
                                                    <div class="candidate-cell__avatar" style={candidate.avatarStyle}>
                                                        {candidate.initials}
                                                    </div>
                                                    <div>
                                                        <p class="candidate-cell__name">{candidate.name}</p>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="table__muted">{candidate.email}</td>
                                            <td class="table__muted">{candidate.convertedDate}</td>
                                            <td>
                                                <div class="score-wrap">
                                                    <svg class="score-ring" viewBox="0 0 36 36" width="38" height="38">
                                                        <circle cx="18" cy="18" r="14" fill="none" stroke="#EDF2F7" stroke-width="3.5"/>
                                                        <circle
                                                            cx="18" cy="18" r="14"
                                                            fill="none"
                                                            stroke={candidate.scoreColor}
                                                            stroke-width="3.5"
                                                            stroke-dasharray={candidate.scoreDash}
                                                            stroke-dashoffset={candidate.scoreDashOffset}
                                                            stroke-linecap="round"
                                                            transform="rotate(-90 18 18)"
                                                        />
                                                        <text x="18" y="22" text-anchor="middle" class="score-ring__text" fill={candidate.scoreColor}>{candidate.score}</text>
                                                    </svg>
                                                </div>
                                            </td>
                                            <td>
                                                <button class="btn-view" data-id={candidate.id} onclick={handleViewCandidate}>
                                                    View →
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>

            </div>

            <!-- Right: Interviews Today + Open Jobs -->
            <div class="dashboard__col dashboard__col--narrow">

                <!-- Interviews Today -->
                <div class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">Today's Interviews</h2>
                        <span class="panel__badge">{interviewsTodayCount}</span>
                    </div>
                    <template for:each={todaysInterviews} for:item="iv">
                        <div key={iv.id} class="interview-card">
                            <div class="interview-card__time">
                                <span class="interview-card__hour">{iv.hour}</span>
                                <span class="interview-card__ampm">{iv.ampm}</span>
                            </div>
                            <div class="interview-card__info">
                                <p class="interview-card__name">{iv.candidateName}</p>
                                <p class="interview-card__round">{iv.round}</p>
                                <p class="interview-card__meta">{iv.interviewer} · {iv.format}</p>
                            </div>
                            <div class="interview-card__avatar" style={iv.avatarStyle}>{iv.initials}</div>
                        </div>
                    </template>
                    <template if:true={noInterviewsToday}>
                        <div class="empty-state">
                            <span class="empty-state__icon">📅</span>
                            <p>No interviews today</p>
                        </div>
                    </template>
                    <button class="panel__footer-btn" onclick={navigateToInterviews}>
                        Manage Interviews →
                    </button>
                </div>

                <!-- Open Jobs -->
                <div class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">Open Positions</h2>
                        <button class="panel__link" onclick={navigateToJobs}>View all →</button>
                    </div>
                    <template for:each={openJobs} for:item="job">
                        <button type="button" key={job.id} class="job-row" onclick={handleJobClick} data-id={job.id}>
                            <div class="job-row__icon">{job.deptIcon}</div>
                            <div class="job-row__info">
                                <p class="job-row__title">{job.title}</p>
                                <p class="job-row__meta">{job.dept} · {job.location}</p>
                            </div>
                            <span class="job-row__count">{job.applicants}</span>
                        </button>
                    </template>
                </div>

            </div>
        </div>
    </div>
</template>

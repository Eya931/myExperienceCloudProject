<template>
    <div class="profile-layout">
        <div class="form-card">
            <div class="fc-header">
                <span class="fc-title">My Profile</span>
                <div class="fc-avail">
                    <span class="fc-avail-label">Available for hire?</span>
                    <button
                        type="button"
                        class="toggle"
                        aria-label="Toggle availability"
                        onclick={toggleAvail}
                    ></button>
                </div>
                <button class="btn-cancel" onclick={handleCancel}>Cancel</button>
                <button class="btn-save" onclick={handleSave} disabled={isSaving}>Save Changes</button>
            </div>
            <div class="fc-body">
                <div class="sec-label">Identity</div>
                <div class="grid-3">
                    <div class="form-group"><label class="form-label" for="pp-firstname">First Name</label><input id="pp-firstname" class="form-input" value={firstNameValue} onchange={handleFirstName}/></div>
                    <div class="form-group"><label class="form-label" for="pp-lastname">Last Name</label><input id="pp-lastname" class="form-input" value={lastNameValue} onchange={handleLastName}/></div>
                    <div class="form-group"><label class="form-label" for="pp-email">Email</label><input id="pp-email" class="form-input" value={email} onchange={handleEmail}/></div>
                </div>

                <div class="sec-label">Contact</div>
                <div class="grid-2">
                    <div class="form-group"><label class="form-label" for="pp-phone">Phone</label><input id="pp-phone" class="form-input" value={phone} onchange={handlePhone}/></div>
                    <div class="form-group"><label class="form-label" for="pp-username">Username</label><input id="pp-username" class="form-input" value={userName} disabled/></div>
                </div>

                <div class="sec-label">CV / Resume</div>
                <div class="cv-row">
                    <div class="cv-name">{displayedCvName}</div>
                    <input class="cv-input" type="file" accept=".pdf,.doc,.docx,.txt" onchange={handleCvFileChange}/>
                    <button class="btn-cancel" type="button" onclick={handleBrowseCv}>Choose File</button>
                    <button class="btn-save" type="button" onclick={handleUploadCv} disabled={isUploadingCv}>Update CV</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="av-card">
                <div class="av-body">
                    <div class="av-name">{userName}</div>
                    <div class="av-role">Candidate</div>
                    <div class="av-div"></div>
                    <div class="ai-row"><div class="ai-ic">📞</div><span class="ai-v">{phone}</span></div>
                    <div class="ai-row"><div class="ai-ic">✉️</div><span class="ai-v">{email}</span></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-title">Matching Insights</div>
                <div class="metric-row">
                    <span>Real AI Matching Score</span>
                    <strong>{matchingLabel}</strong>
                </div>
                <div class="metric-row">
                    <span>Profile Completion</span>
                    <strong>{completionLabel}</strong>
                </div>
            </div>
        </div>
    </div>
</template>

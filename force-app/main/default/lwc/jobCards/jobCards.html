<template>
    <div class="page">

        <!-- ========== SECTION HEADER ========== -->
        <section class="section-header">
            <h2 class="section-title">Find Your Jobs</h2>
            <p class="section-subtitle">Find the job that best suits you</p>
        </section>

        <!-- ========== SEARCH BAR ========== -->
        <section class="search-section">
            <div class="search-bar">
                <div class="search-field">
                    <span class="field-icon">&#128269;</span>
                    <input
                        type="text"
                        class="field-input"
                        placeholder="Search Position"
                        value={searchTerm}
                        onkeyup={handleSearchInput}
                    />
                </div>
                <div class="search-divider"></div>
                <div class="search-field">
                    <span class="field-icon">&#128205;</span>
                    <input
                        type="text"
                        class="field-input"
                        placeholder="Location"
                        value={locationTerm}
                        onkeyup={handleLocationInput}
                    />
                </div>
                <div class="search-divider"></div>
                <div class="search-field filter-field">
                    <span class="field-icon">&#128188;</span>
                    <select class="field-select" onchange={handleTypeSelect}>
                        <option value="">Position Job</option>
                        <template for:each={typeOptions} for:item="opt">
                            <option key={opt} value={opt}>{opt}</option>
                        </template>
                    </select>
                </div>
                <button class="find-btn" onclick={handleFindNow}>Find Now &#8594;</button>
            </div>
        </section>

        <!-- ========== FILTERS ========== -->
        <section class="filter-section">
            <div class="filter-row">
                <button class={allFilterClass} onclick={handleFilterAll}>All</button>
                <template for:each={departmentFilters} for:item="dept">
                    <button key={dept.name} class={dept.className} data-value={dept.name} onclick={handleFilterDepartment}>
                        {dept.name}
                    </button>
                </template>
            </div>
            <p class="results-count"><strong>{displayedCount}</strong> jobs found</p>
        </section>

        <!-- ========== CARDS ========== -->
        <section class="job-grid">
            <template if:true={displayedJobs}>
                <template for:each={displayedJobs} for:item="job">
                    <button key={job.Id} class="card" data-id={job.Id} onclick={handleJobClick}>
                        <div class="card-top">
                            <div class={job.avatarClass}>{job.initial}</div>
                            <div class="card-header-info">
                                <h3 class="job-title">{job.Job_Title__c}</h3>
                                <p class="job-company">{job.Name}</p>
                            </div>
                        </div>
                        <p class="job-desc">{job.descriptionPreview}</p>
                        <div class="card-meta">
                            <span class="meta-pill location">
                                <span class="pill-icon">&#128205;</span>{job.Location__c}
                            </span>
                            <template if:true={job.Employment_Type__c}>
                                <span class="meta-pill type">
                                    <span class="pill-icon">&#128188;</span>{job.Employment_Type__c}
                                </span>
                            </template>
                            <template if:true={job.formattedSalary}>
                                <span class="meta-pill salary">
                                    <span class="pill-icon">&#128176;</span>{job.formattedSalary}
                                </span>
                            </template>
                        </div>
                        <div class="card-tags">
                            <template if:true={job.Department__c}>
                                <span class="tag dept-tag">{job.Department__c}</span>
                            </template>
                            <template if:true={job.Experience_Level__c}>
                                <span class="tag level-tag">{job.Experience_Level__c}</span>
                            </template>
                            <template if:true={job.hasSkills}>
                                <template for:each={job.skillsList} for:item="skill">
                                    <span key={skill.id} class="tag skill-tag">{skill.name}</span>
                                </template>
                            </template>
                        </div>
                        <div class="card-footer">
                            <span class="posted-time">{job.timeAgo}</span>
                            <span class="apply-btn">Show More &#8594;</span>
                        </div>
                    </button>
                </template>
            </template>

            <template if:true={noResults}>
                <div class="empty-state">
                    <div class="empty-icon">&#128269;</div>
                    <h3>No matching jobs</h3>
                    <p>Try different keywords or remove some filters</p>
                </div>
            </template>
        </section>

        <!-- ========== JOB DETAIL MODAL ========== -->
        <c-job-details
            job={selectedJob}
            visible={showDetail}
            color-index={selectedColorIndex}
            onclose={handleDetailClose}
            onapply={handleApply}
        ></c-job-details>

        <!-- ========== APPLICATION FORM MODAL ========== -->
        <c-application-form
            job={applicationJob}
            visible={showApplicationForm}
            onclose={handleApplicationClose}
        ></c-application-form>

        <!-- ========== ERROR ========== -->
        <template if:true={error}>
            <div class="error-panel">
                <h3>&#9888; Something went wrong</h3>
                <p>Unable to load jobs. Please try again later.</p>
            </div>
        </template>

        <!-- ========== LOADING ========== -->
        <template if:false={allJobs}>
            <template if:false={error}>
                <div class="loading-section">
                    <div class="loader"></div>
                    <p>Loading opportunities...</p>
                </div>
            </template>
        </template>

    </div>
</template>

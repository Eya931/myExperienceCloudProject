<template>
    <div class="page">

        <!-- Left Panel -->
        <div class="left-panel">
            <div class="left-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="18" height="18" viewBox="0 0 15 15" fill="none">
                            <path d="M7.5 1.5L13 4.5V10.5L7.5 13.5L2 10.5V4.5L7.5 1.5Z" fill="white" fill-opacity="0.95"/>
                        </svg>
                    </div>
                    <span class="logo-text">TalentBridge</span>
                </div>

                <div class="left-hero">
                    <div class="badge">✦ Espace Candidat</div>
                    <h1 class="hero-title">Bienvenue sur votre<br/><span class="accent">espace carrière</span></h1>
                    <p class="hero-sub">Accédez à vos candidatures, suivez vos opportunités et gérez votre profil professionnel.</p>
                </div>

                <div class="stats-row">
                    <div class="stat">
                        <span class="stat-num">8+</span>
                        <span class="stat-label">Offres actives</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span class="stat-num">5+</span>
                        <span class="stat-label">Départements</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span class="stat-num">5+</span>
                        <span class="stat-label">Localisations</span>
                    </div>
                </div>

                <div class="deco-circles">
                    <div class="circle c1"></div>
                    <div class="circle c2"></div>
                    <div class="circle c3"></div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="card">

                <div class="card-header">
                    <h2 class="card-title">Connexion</h2>
                    <p class="card-sub">Accédez à votre espace candidat</p>
                </div>

                <!-- Error banner -->
                <template if:true={errorMessage}>
                    <div class="error-banner">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="8" r="7" stroke="#b91c1c" stroke-width="1.5"/>
                            <path d="M8 5v4M8 11v.5" stroke="#b91c1c" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        {errorMessage}
                    </div>
                </template>

                <div class="form">

                    <!-- Username -->
                    <div class="field-group">
                        <label class="label">Nom d'utilisateur</label>
                        <div class="input-wrap">
                            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <circle cx="8" cy="5" r="3" stroke="#9ca3af" stroke-width="1.4"/>
                                <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#9ca3af" stroke-width="1.4" stroke-linecap="round"/>
                            </svg>
                            <input
                                type="text"
                                class="input"
                                placeholder="votre@email.com"
                                value={username}
                                onchange={handleUsernameChange}
                                onkeydown={handleKeyDown}
                            />
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="field-group">
                        <div class="label-row">
                            <label class="label">Mot de passe</label>
                            <a class="forgot-link" onclick={handleForgotPassword}>Mot de passe oublié ?</a>
                        </div>
                        <div class="input-wrap">
                            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <rect x="2" y="7" width="12" height="8" rx="2" stroke="#9ca3af" stroke-width="1.4"/>
                                <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="#9ca3af" stroke-width="1.4" stroke-linecap="round"/>
                                <circle cx="8" cy="11" r="1" fill="#9ca3af"/>
                            </svg>
                            <input
                                type={passwordFieldType}
                                class="input"
                                placeholder="••••••••"
                                value={password}
                                onchange={handlePasswordChange}
                                onkeydown={handleKeyDown}
                            />
                            <button class="toggle-btn" onclick={togglePasswordVisibility} type="button">
                                <template if:true={showPassword}>
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                        <path d="M2 8s2.5-4 6-4 6 4 6 4-2.5 4-6 4-6-4-6-4z" stroke="#9ca3af" stroke-width="1.4"/>
                                        <circle cx="8" cy="8" r="1.5" stroke="#9ca3af" stroke-width="1.4"/>
                                        <path d="M3 3l10 10" stroke="#9ca3af" stroke-width="1.4" stroke-linecap="round"/>
                                    </svg>
                                </template>
                                <template if:false={showPassword}>
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                        <path d="M2 8s2.5-4 6-4 6 4 6 4-2.5 4-6 4-6-4-6-4z" stroke="#9ca3af" stroke-width="1.4"/>
                                        <circle cx="8" cy="8" r="1.5" stroke="#9ca3af" stroke-width="1.4"/>
                                    </svg>
                                </template>
                            </button>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button
                        class={submitBtnClass}
                        onclick={handleLogin}
                        disabled={isLoading}
                    >
                        <template if:true={isLoading}>
                            <span class="spinner"></span>
                            Connexion en cours...
                        </template>
                        <template if:false={isLoading}>
                            Se connecter
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </template>
                    </button>
                </div>

                <div class="card-footer">
                    <p class="footer-text">
                        Première connexion ?
                        <a class="footer-link" onclick={handleForgotPassword}>Définir votre mot de passe</a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</template>

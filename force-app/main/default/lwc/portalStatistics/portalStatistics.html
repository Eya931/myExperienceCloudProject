<template>
    <div class="statistics">
        <div class="stats-grid">
            <template for:each={statCards} for:item="s">
                <div key={s.id} class="stat-card">
                    <div class="stat-label">{s.label}</div>
                    <div class="stat-num">{s.value}</div>
                    <div class="stat-sub">{s.sub}</div>
                </div>
            </template>
        </div>
        <div class="chart-row">
            <div class="card">
                <div class="card-header"><span class="card-title">Skills Match Rate</span></div>
                <div class="bar-section">
                    <template for:each={skills} for:item="sk">
                        <div key={sk.name} class="bar-item">
                            <span class="bar-label">{sk.name}</span>
                            <div class="bar-track">
                                <div class={sk.fillClass} style={sk.widthStyle}></div>
                            </div>
                            <span class="bar-pct">{sk.pct}%</span>
                        </div>
                    </template>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">Recent Activity</span></div>
                <div class="activity-list">
                    <template for:each={activities} for:item="act">
                        <div key={act.id} class="act-row">
                            <div class={act.dotClass}></div>
                            <div class="act-text">{act.text}</div>
                            <div class="act-time">{act.time}</div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>

<template>
    <header class="hero">

        <!-- Slides -->
        <div class={slide0Class}><div class="slide-overlay"></div></div>
        <div class={slide1Class}><div class="slide-overlay"></div></div>
        <div class={slide2Class}><div class="slide-overlay"></div></div>

        <!-- Navigation -->
        <nav class="hero-nav">
            <a href="#" class="logo">
                <div class="logo-icon">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                        <path d="M7.5 1.5L13 4.5V10.5L7.5 13.5L2 10.5V4.5L7.5 1.5Z" fill="white" fill-opacity="0.95"/>
                    </svg>
                </div>
                TalentBridge
            </a>
            <ul class="nav-links">
                <li><button class="nav-link" data-page="Home"         onclick={handleNavClick}>Home</button></li>
                <li><button class="nav-link" data-page="About_Us"     onclick={handleNavClick}>About Us</button></li>
                <li><button class="nav-link" data-page="Job_Listings" onclick={handleNavClick}>Job Listings</button></li>
                <li><button class="nav-link" data-page="How_It_Works" onclick={handleNavClick}>How It Works</button></li>
            </ul>
            <div class="nav-actions"></div>
        </nav>

        <!-- Hero Content -->
        <div class="hero-content">
            <div class="badge">&#10022; Where Ambition Meets Opportunity</div>
            <h1 class="hero-title">Discover Opportunities,<br/>Achieve Your Dream Career.</h1>
            <p class="hero-sub">
                Connect with top employers, explore thousands of roles, and take the next bold step in your professional journey.
            </p>

            <!-- Search Bar -->
            <div class="search-bar">

                <!-- Position search -->
                <div class="s-field">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                        <circle cx="6.5" cy="6.5" r="4.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.4"/>
                        <path d="M10 10L13.5 13.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                    <input
                        type="text"
                        placeholder="Search Position, Title..."
                        value={searchTerm}
                        onkeyup={handleSearchChange}
                    />
                </div>

                <!-- Location — transparent input + smart suggestions -->
                <div class="s-select">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path d="M6.5 1C4.29 1 2.5 2.79 2.5 5c0 3.5 4 7 4 7s4-3.5 4-7c0-2.21-1.79-4-4-4z" stroke="rgba(255,255,255,0.5)" stroke-width="1.3"/>
                        <circle cx="6.5" cy="5" r="1.2" fill="rgba(255,255,255,0.5)"/>
                    </svg>
                    <div class="location-wrapper">
                        <input
                            type="text"
                            placeholder="Location"
                            value={locationTerm}
                            onkeyup={handleLocationChange}
                            onfocus={handleLocationFocus}
                            onblur={handleLocationBlur}
                            autocomplete="off"
                        />
                        <!-- Suggestions popup -->
                        <template if:true={showSuggestions}>
                            <div class="location-suggestions">
                                <template for:each={filteredLocations} for:item="loc">
                                    <button
                                        key={loc}
                                        class="suggestion-item"
                                        data-value={loc}
                                        onmousedown={handleSuggestionPick}
                                    >
                                        <span class="suggestion-pin">&#128205;</span>
                                        <span class="suggestion-text">{loc}</span>
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Job Type — dynamic from Apex -->
                <div class="s-select last">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <rect x="1.5" y="2.5" width="10" height="9" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.3"/>
                        <path d="M4.5 1.5v2M8.5 1.5v2M1.5 5.5h10" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    <select onchange={handleJobTypeChange}>
                        <option value="">Job Type</option>
                        <template for:each={typeOptions} for:item="opt">
                            <option key={opt} value={opt}>{opt}</option>
                        </template>
                    </select>
                </div>

                <button class="find-btn" onclick={handleSearch}>
                    Find Now
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path d="M2 6.5h9M8 3.5l3 3-3 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Slide Label -->
        <div class="slide-label">{slideLabel}</div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-num">{totalJobs}+</div>
                <div class="stat-label">Active Jobs</div>
            </div>
            <div class="stat">
                <div class="stat-num">{totalDepartments}+</div>
                <div class="stat-label">Departments</div>
            </div>
            <div class="stat">
                <div class="stat-num">{totalLocations}+</div>
                <div class="stat-label">Locations</div>
            </div>
        </div>

        <!-- Arrows -->
        <div class="arrows">
            <button class="arrow" onclick={handlePrev}>&#8592;</button>
            <button class="arrow" onclick={handleNext}>&#8594;</button>
        </div>

        <!-- Dots -->
        <div class="dots">
            <button class={dot0Class} data-index="0" onclick={handleDotClick}></button>
            <button class={dot1Class} data-index="1" onclick={handleDotClick}></button>
            <button class={dot2Class} data-index="2" onclick={handleDotClick}></button>
        </div>

    </header>
</template>

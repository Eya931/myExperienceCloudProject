<template>
    <div class="dashboard">
        <!-- Hero -->
        <div class="hero">
            <div class="h-sh1"></div><div class="h-sh2"></div><div class="h-sh3"></div>
            <div class="h-ph"></div><div class="h-pv"></div>
            <div class="hero-left">
                <div class="hero-date">{todayDate}</div>
                <div class="hero-name">Good morning, {userName}!</div>
                <div class="hero-sub">You have 1 active coding test and 2 unread messages from the talent team.</div>
            </div>
            <div class="hero-av">
                <div class="hero-hex">
                    <svg width="68" height="68" viewBox="0 0 68 68">
                        <polygon points="34,2 64,18 64,50 34,66 4,50 4,18" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
                    </svg>
                    <div class="hero-initials">{userInitials}</div>
                </div>
            </div>
        </div>

        <!-- Stat cards -->
        <div class="stat-grid">
            <template for:each={stats} for:item="stat">
                <div key={stat.id} class="stat-card">
                    <div class="stat-label">{stat.label}</div>
                    <div class="stat-num">{stat.value}</div>
                    <div class="stat-sub">{stat.sub}</div>
                </div>
            </template>
        </div>

        <!-- Bottom: applications + messages -->
        <div class="dash-bottom">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">My Applications</span>
                    <lightning-button label="View all" variant="neutral" onclick={goToApplications}></lightning-button>
                </div>
                <div class="app-list">
                    <template for:each={applications} for:item="app">
                        <div key={app.id} class="app-row">
                            <div class={app.iconClass}>{app.initials}</div>
                            <div class="app-info">
                                <div class="app-title">{app.title}</div>
                                <div class="app-meta">{app.meta}</div>
                            </div>
                            <span class={app.badgeClass}>{app.stage}</span>
                        </div>
                    </template>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Messages</span>
                    <lightning-button label="View all" variant="neutral" onclick={goToMessages}></lightning-button>
                </div>
                <div class="msg-list">
                    <template for:each={messages} for:item="msg">
                        <div key={msg.id} class="msg-row">
                            <div class="msg-av">T</div>
                            <div class="msg-body">
                                <div class="msg-from">
                                    TalentBridge Team
                                    <template if:true={msg.unread}><div class="msg-dot"></div></template>
                                </div>
                                <div class="msg-subj">{msg.subject}</div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
